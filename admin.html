<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBOM 管理儀表板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FAF9F5; min-height: 100vh; color: #141413;
        }
        .header {
            background: white; border-bottom: 1px solid #E6E3DA;
            padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
        }
        .header h1 { font-size: 20px; }
        .header .nav { display: flex; gap: 8px; }
        .header .nav a {
            padding: 6px 14px; border: 1px solid #E6E3DA; border-radius: 6px;
            text-decoration: none; color: #141413; font-size: 13px; transition: background 0.2s;
        }
        .header .nav a:hover { background: #F0EEE6; }

        .dashboard { max-width: 1100px; margin: 0 auto; padding: 24px; display: grid; gap: 16px; }

        .card {
            background: white; border: 1px solid #E6E3DA; border-radius: 12px;
            padding: 20px;
        }
        .card h3 { font-size: 15px; color: #141413; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .card h3 .badge {
            background: #D97757; color: white; border-radius: 10px; padding: 2px 8px;
            font-size: 11px; font-weight: 600;
        }

        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .kpi {
            background: #F0EEE6; border-radius: 8px; padding: 16px; text-align: center;
        }
        .kpi .num { font-size: 32px; font-weight: 700; color: #D97757; }
        .kpi .label { font-size: 12px; color: #87867F; margin-top: 4px; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 768px) { .stats-row { grid-template-columns: 1fr; } }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 8px; background: #F0EEE6; font-size: 12px; color: #87867F; border-radius: 4px; }
        td { padding: 8px; border-bottom: 1px solid #F0EEE6; }
        tr:hover td { background: #FAF9F5; }

        .bar-wrap { height: 8px; background: #E6E3DA; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: #D97757; border-radius: 4px; transition: width 0.5s ease; }

        .empty { text-align: center; padding: 40px; color: #87867F; }

        .error-list { max-height: 300px; overflow-y: auto; font-size: 12px; }
        .error-item {
            padding: 6px 8px; border-bottom: 1px solid #F0EEE6; font-family: monospace; font-size: 11px;
        }
        .error-item .err-msg { color: #D97757; }
        .error-item .err-meta { color: #87867F; margin-top: 2px; }

        .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; }
        .tab-bar button {
            padding: 6px 14px; border: 1px solid #E6E3DA; border-radius: 6px;
            background: white; cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .tab-bar button.active { background: #D97757; color: white; border-color: #D97757; }

        .loading { text-align: center; padding: 40px; color: #87867F; }
        .refresh-btn {
            padding: 6px 12px; border: 1px solid #E6E3DA; border-radius: 6px;
            background: white; cursor: pointer; font-size: 12px;
        }
        .refresh-btn:hover { background: #F0EEE6; }

        #password-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(20,20,19,0.5); display: flex;
            align-items: center; justify-content: center;
        }
        #password-overlay .pw-box {
            background: white; border-radius: 12px; padding: 28px 24px;
            width: 300px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        #password-overlay input {
            width: 100%; padding: 10px; border: 1px solid #E6E3DA;
            border-radius: 8px; font-size: 14px; text-align: center;
            margin: 12px 0; outline: none;
        }
        #password-overlay input:focus { border-color: #D97757; }
        #password-overlay button {
            width: 100%; padding: 10px; border: none; border-radius: 8px;
            background: #788C5D; color: white; font-size: 14px; cursor: pointer;
        }
        #pw-error { color: #D97757; font-size: 12px; margin: 4px 0; display: none; }
    </style>
</head>
<body>

<div id="password-overlay">
    <div class="pw-box">
        <h3>🔒 管理員驗證</h3>
        <input type="password" id="pw-input" placeholder="請輸入管理密碼" autocomplete="off">
        <div id="pw-error">密碼錯誤，請重試</div>
        <button onclick="verifyAdmin()">確認</button>
    </div>
</div>

<div class="header">
    <h1>📊 WebBOM 管理儀表板</h1>
    <div class="nav">
        <a href="index.html">← 返回產品列表</a>
        <button class="refresh-btn" onclick="refreshData()">🔄 刷新</button>
    </div>
</div>

<div class="dashboard">
    <!-- KPI 卡片 -->
    <div class="card">
        <h3>今日數據摘要</h3>
        <div class="kpi-grid" id="kpi-grid">
            <div class="loading">載入中...</div>
        </div>
    </div>

    <!-- Tab 切換 -->
    <div class="card">
        <div class="tab-bar">
            <button class="active" onclick="switchTab('overview')">總覽</button>
            <button onclick="switchTab('parts')">零件分析</button>
            <button onclick="switchTab('errors')">錯誤追蹤</button>
            <button onclick="switchTab('raw')">原始數據</button>
        </div>

        <!-- 總覽 -->
        <div id="tab-overview">
            <div class="stats-row">
                <div>
                    <h3>📅 每日活躍用戶</h3>
                    <div id="daily-chart"><div class="loading">載入中...</div></div>
                </div>
                <div>
                    <h3>📱 設備分佈</h3>
                    <div id="device-chart"><div class="loading">載入中...</div></div>
                </div>
            </div>
        </div>

        <!-- 零件分析 -->
        <div id="tab-parts" style="display:none;">
            <h3>🔥 最常被詢價零件 TOP 10</h3>
            <div id="part-rank"><div class="loading">載入中...</div></div>
        </div>

        <!-- 錯誤追蹤 -->
        <div id="tab-errors" style="display:none;">
            <h3>⚠️ JS 錯誤記錄</h3>
            <div class="error-list" id="error-log"><div class="loading">載入中...</div></div>
        </div>

        <!-- 原始數據 -->
        <div id="tab-raw" style="display:none;">
            <h3>📋 原始日誌 CSV</h3>
            <div id="raw-log"><div class="loading">載入中...</div></div>
        </div>
    </div>
</div>

<script src="sanitize.js"></script>
<script src="analytics.js"></script>
<script>
// ============================================================
// 管理員驗證（SHA-256 hash，不再使用明文密碼）
// ============================================================
// 預設密碼 'webom2024' 的 SHA-256 hash
// 請在部署時更換為自訂密碼的 hash：
//   echo -n '你的密碼' | shasum -a 256
const ADMIN_PASSWORD_HASH = '6d23d6842954d957582968838f89ae5302f8628f6dc861b3187d18d92d997b87';
const DEFAULT_HASH = '6d23d6842954d957582968838f89ae5302f8628f6dc861b3187d18d92d997b87';

async function hashPassword(password) {
    if (window.crypto && window.crypto.subtle) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hash = await window.crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash))
            .map(b => b.toString(16).padStart(2, '0'))
            .join('');
    }
    // 降級：簡單 hash
    let hash = 0;
    for (let i = 0; i < password.length; i++) {
        hash = ((hash << 5) - hash) + password.charCodeAt(i);
        hash |= 0;
    }
    return 'legacy_' + Math.abs(hash).toString(16);
}

async function verifyAdmin() {
    const input = document.getElementById('pw-input');
    const pw = input.value;
    const hash = await hashPassword(pw);
    const validHash = ADMIN_PASSWORD_HASH || DEFAULT_HASH;

    if (hash === validHash) {
        sessionStorage.setItem('webBom_admin', '1');
        document.getElementById('password-overlay').style.display = 'none';
        loadDashboard();
    } else {
        document.getElementById('pw-error').style.display = 'block';
        input.value = '';
        input.focus();
    }
}

if (sessionStorage.getItem('webBom_admin') === '1') {
    document.getElementById('password-overlay').style.display = 'none';
    loadDashboard();
} else {
    document.getElementById('pw-input').focus();
}

// ============================================================
// 數據載入
// ============================================================
let logData = [];
let currentTab = 'overview';

async function loadDashboard() {
    try {
        // 載入 stats.json
        var statsRes = await fetch('./data/stats.json');
        var stats = statsRes.ok ? await statsRes.json() : {};

        // 載入產品清單
        var productRes = await fetch('./products.json');
        var products = productRes.ok ? (await productRes.json()).products || [] : [];

        // 載入 localStorage 分析數據
        var analyticsSummary = window.WebBOMAnalytics ? window.WebBOMAnalytics.getSummary() : null;

        renderKPIs(stats, products, analyticsSummary);
        renderStats(stats, analyticsSummary);

        if (window.WebBOMAnalytics) {
            window.WebBOMAnalytics.pageview('admin');
        }
    } catch (err) {
        console.error('Dashboard load error:', err);
    }
}

function renderKPIs(stats, products, analytics) {
    var totalParts = 0, totalCustomers = 0, totalOrders = 0;
    var productCount = products.length;

    Object.values(stats || {}).forEach(function(s) {
        if (s.topParts) totalParts += s.topParts.length;
        if (s.topCustomers) {
            totalCustomers += s.topCustomers.length;
            s.topCustomers.forEach(function(c) { totalOrders += c.orderCount; });
        }
    });

    var pv = analytics ? analytics.pageviews : 0;
    var inqs = analytics ? analytics.inquiries : 0;

    document.getElementById('kpi-grid').innerHTML = [
        { num: productCount, label: '產品數' },
        { num: totalParts, label: '已記錄零件' },
        { num: totalCustomers, label: '歷史客戶' },
        { num: totalOrders, label: '採購次數' },
        { num: pv, label: '頁面瀏覽' },
        { num: inqs, label: '詢價次數' }
    ].map(function(k) {
        return '<div class="kpi"><div class="num">' + k.num + '</div><div class="label">' + k.label + '</div></div>';
    }).join('');
}

function renderStats(stats, analytics) {
    // 月度趨勢
    var allMonthly = [];
    Object.values(stats || {}).forEach(function(s) {
        (s.monthlyStats || []).forEach(function(m) {
            var found = allMonthly.find(function(x) { return x.month === m.month; });
            if (found) { found.totalQty += m.totalQty; } else { allMonthly.push({month:m.month, totalQty:m.totalQty}); }
        });
    });
    var maxQty = Math.max.apply(null, allMonthly.map(function(m) { return m.totalQty; }).concat([1]));

    document.getElementById('daily-chart').innerHTML = allMonthly.length === 0
        ? '<div class="empty">暫無月度數據</div>'
        : '<table>' + allMonthly.map(function(m) {
            var pct = (m.totalQty / maxQty * 100).toFixed(0);
            return '<tr><td style="width:80px">' + m.month + '</td><td><div class="bar-wrap"><div class="bar-fill" style="width:' + pct + '%"></div></div></td><td style="width:50px;text-align:right">' + m.totalQty + '</td></tr>';
          }).join('') + '</table>';

    // 設備分佈（來自 localStorage）
    var deviceHTML = '<div class="empty">暫無瀏覽數據</div>';
    if (analytics && analytics.devices) {
        var devices = Object.entries(analytics.devices).sort(function(a, b) { return b[1] - a[1]; });
        if (devices.length > 0) {
            var maxDev = devices[0][1];
            deviceHTML = '<table>' + devices.map(function(d) {
                var pct = (d[1] / maxDev * 100).toFixed(0);
                var icon = d[0].indexOf('iOS') >= 0 ? '🍎' : d[0].indexOf('Android') >= 0 ? '🤖' : '💻';
                return '<tr><td>' + icon + ' ' + d[0] + '</td><td><div class="bar-wrap"><div class="bar-fill" style="width:' + pct + '%"></div></div></td><td style="width:40px;text-align:right">' + d[1] + '</td></tr>';
            }).join('') + '</table>';
        }
    }
    document.getElementById('device-chart').innerHTML = deviceHTML;

    // 零件排名
    var allParts = [];
    Object.values(stats || {}).forEach(function(s) {
        (s.hotParts || s.topParts || []).forEach(function(p) {
            var found = allParts.find(function(x) { return x.partNumber === p.partNumber; });
            if (found) { found.totalQty += p.totalQty || 0; found.orderCount += p.orderCount || 0; }
            else { allParts.push({partNumber: p.partNumber, name: p.name || '', totalQty: p.totalQty || 0, orderCount: p.orderCount || 0}); }
        });
    });
    allParts.sort(function(a, b) { return b.totalQty - a.totalQty; });

    document.getElementById('part-rank').innerHTML = allParts.length === 0
        ? '<div class="empty">暫無零件數據</div>'
        : '<table><tr><th>#</th><th>料號</th><th>名稱</th><th>總數量</th><th>採購次數</th></tr>'
          + allParts.slice(0, 10).map(function(p, i) {
              return '<tr><td>' + (i+1) + '</td><td style="font-weight:600">' + p.partNumber + '</td><td style="color:#87867F">' + p.name + '</td><td>' + p.totalQty + '</td><td>' + p.orderCount + '</td></tr>';
          }).join('') + '</table>';

    // 錯誤記錄（來自 localStorage）
    if (analytics && analytics.errors > 0 && window.WebBOMAnalytics) {
        var csv = window.WebBOMAnalytics.exportCSV();
        var lines = csv.split('\n').slice(1); // skip header
        var errorLines = lines.filter(function(l) { return l.indexOf('"error"') >= 0; });
        document.getElementById('error-log').innerHTML = errorLines.length === 0
            ? '<div class="empty">無錯誤記錄</div>'
            : errorLines.map(function(l) {
                var parts = l.split('","');
                var msg = (parts[6] || '').replace(/"/g, '');
                var device = (parts[4] || '').replace(/"/g, '');
                var ts = (parts[1] || '').replace(/"/g, '');
                return '<div class="error-item"><div class="err-msg">' + msg + '</div><div class="err-meta">' + ts + ' | ' + device + '</div></div>';
              }).join('');
    } else {
        document.getElementById('error-log').innerHTML = '<div class="empty">無錯誤記錄</div>';
    }

    // 原始數據匯出
    document.getElementById('raw-log').innerHTML = '<div style="text-align:center;padding:20px;">'
        + '<p style="margin-bottom:12px;color:#87867F;">數據存於瀏覽器 localStorage，可匯出 CSV</p>'
        + '<button onclick="exportAnalytics()" style="padding:10px 20px;border:none;border-radius:8px;background:#D97757;color:white;cursor:pointer;font-size:14px;margin-right:8px;">📥 匯出 CSV</button>'
        + '<button onclick="clearAnalytics()" style="padding:10px 20px;border:1px solid #E6E3DA;border-radius:8px;background:white;cursor:pointer;font-size:14px;color:#D97757;">🗑 清除數據</button>'
        + '<p style="margin-top:8px;font-size:11px;color:#87867F;">注意：localStorage 僅在同一瀏覽器中儲存，清除會永久刪除</p>'
        + '</div>';
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-bar button').forEach(function(b) { b.classList.remove('active'); });
    event.target.classList.add('active');
    ['overview', 'parts', 'errors', 'raw'].forEach(function(t) {
        document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
    });
}

function refreshData() {
    loadDashboard();
}

function exportAnalytics() {
    if (!window.WebBOMAnalytics) return;
    var csv = window.WebBOMAnalytics.exportCSV();
    if (!csv) { alert('暫無數據'); return; }
    var blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'webbom-analytics-' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
}

function clearAnalytics() {
    if (!confirm('確定要清除所有分析數據？此操作不可恢復。')) return;
    if (window.WebBOMAnalytics) window.WebBOMAnalytics.clear();
    loadDashboard();
}
</script>
</body>
</html>
