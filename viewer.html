<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>WebBOM 查看器</title>
    <link rel="stylesheet" href="viewer.css">
    <script src="sanitize.js"></script>
    <script src="analytics.js"></script>
</head>
<body>

    <!-- 載入畫面 -->
    <div id="loading">
        <div class="spinner"></div>
        <span id="loading-text">載入產品資料...</span>
        <div id="loading-error"></div>
    </div>

    <!-- 頂部欄 -->
    <div class="topbar">
        <button class="back-btn" onclick="goBack()">← 產品列表</button>
        <h1 id="product-title">載入中...</h1>
        <button class="back-btn" onclick="shareProduct()" title="分享此產品">🔗</button>
        <button class="back-btn" onclick="toggleDarkMode()" title="切換暗色模式" style="font-size:14px;">🌓</button>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- SVG 面板 -->
        <div class="svg-panel" id="svg-panel">
            <div class="svg-container" id="svg-container">
                <div style="text-align:center;padding:20px;color:#87867F;font-size:14px;">載入爆炸圖...</div>
            </div>
        </div>

        <!-- BOM 面板 -->
        <div class="bom-panel" id="bom-panel">
            <!-- 統計 -->
            <div>
                <h2>詢價統計</h2>
                <div class="stats-summary">
                    <div class="stats-item"><span>已選擇</span><strong id="selected-count">0</strong></div>
                    <div class="stats-item"><span>總數量</span><strong id="total-quantity">0</strong></div>
                </div>
            </div>

            <!-- 已選擇 -->
            <div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h2>已選擇零件</h2>
                    <button onclick="undo()" style="padding:2px 8px;border:1px solid #E6E3DA;border-radius:4px;background:white;cursor:pointer;font-size:11px;color:#87867F;" title="復原 (Ctrl+Z)">↩ 復原</button>
                </div>
                <div class="selected-items" id="selected-list"></div>
            </div>

            <!-- 收件信箱 -->
            <div style="margin-bottom:8px;">
                <label style="font-size:12px;color:#87867F;display:block;margin-bottom:4px;">詢價收件信箱</label>
                <div style="display:flex;gap:6px;">
                    <input type="email" class="search-box" id="email-input" value="sales@example.com"
                        style="flex:1;margin-bottom:0;" placeholder="輸入郵箱...">
                    <button onclick="saveEmail()" style="padding:8px 12px;border:1px solid #E6E3DA;border-radius:6px;background:white;cursor:pointer;font-size:12px;white-space:nowrap;">儲存</button>
                </div>
            </div>

            <!-- 發送按鈕 -->
            <button class="email-btn" onclick="sendInquiry()" id="email-btn" disabled>發送詢價郵件</button>

            <!-- BOM 清單 -->
            <div>
                <h2>零件清單</h2>
                <input type="text" class="search-box" id="search-box" placeholder="搜尋編號或名稱..." oninput="filterBOM()">
                <div class="bom-toolbar">
                    <button onclick="selectAll()">全選 (Ctrl+A)</button>
                    <button onclick="clearAll()">清除 (Esc)</button>
                </div>
                <div class="bom-list-container" role="listbox" aria-label="零件清單"><div id="bom-list"></div></div>
            </div>

            <!-- 採購統計（默認隱藏，由 tab 切換） -->
            <div id="stats-panel" style="display:none;">
                <h2>採購統計</h2>
                <div id="stats-loading" style="text-align:center;padding:20px;color:#87867F;">載入統計資料...</div>
                <div id="stats-content" style="display:none;">
                    <!-- 高頻零件 -->
                    <div style="margin-bottom:16px;">
                        <h3 style="font-size:14px;color:#D97757;margin-bottom:8px;">🔥 高頻購買零件 TOP 5</h3>
                        <div id="hot-parts-list" style="background:#F0EEE6;border-radius:8px;padding:8px;"></div>
                    </div>
                    <!-- 客戶排名 -->
                    <div style="margin-bottom:16px;">
                        <h3 style="font-size:14px;color:#141413;margin-bottom:8px;">🏢 客戶購買排名</h3>
                        <div id="customer-stats" style="background:#F0EEE6;border-radius:8px;padding:8px;"></div>
                    </div>
                    <!-- 月度趨勢 -->
                    <div style="margin-bottom:16px;">
                        <h3 style="font-size:14px;color:#141413;margin-bottom:8px;">📈 月度購買趨勢</h3>
                        <div id="monthly-stats" style="background:#F0EEE6;border-radius:8px;padding:8px;"></div>
                    </div>
                </div>
                <div id="stats-empty" style="display:none;text-align:center;padding:40px;color:#87867F;font-size:14px;">
                    暫無採購數據<br>
                    <small>請在 data/purchases/ 目錄下添加採購記錄 CSV</small>
                </div>
            </div>
        </div>
    </div>

    <!-- 手機底部 Tab -->
    <div class="mobile-tabs" id="mobile-tabs">
        <button class="active" onclick="switchTab('svg')">
            <span class="tab-icon">🔍</span> 爆炸圖
        </button>
        <button onclick="switchTab('bom')">
            <span class="tab-icon">📋</span> 零件清單
        </button>
        <button onclick="switchTab('stats')" id="stats-tab-btn">
            <span class="tab-icon" id="stats-tab-icon">🔒</span> 採購統計
        </button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 管理員密碼彈窗 -->
    <div class="pw-overlay" id="pw-overlay" style="display:none;">
        <div class="pw-dialog">
            <h3>🔒 管理員驗證</h3>
            <p>採購統計僅限管理員查看</p>
            <input type="password" id="pw-input" placeholder="請輸入管理密碼" autocomplete="off">
            <div class="pw-error" id="pw-error">密碼錯誤，請重試</div>
            <button onclick="verifyAdmin()">確認</button>
            <button class="pw-cancel" onclick="closePwModal()">取消</button>
        </div>
    </div>

    <!-- Android mailto 備用方案 -->
    <div class="pw-overlay" id="mailto-fallback" style="display:none;">
        <div class="pw-dialog" style="width:360px;max-width:90vw;text-align:left;">
            <h3 style="text-align:center;">發送詢價</h3>
            <p style="text-align:center;margin:4px 0 12px;">請複製以下資訊寄送到：<br><strong id="fallback-email"></strong></p>
            <textarea id="fallback-text" readonly
                style="width:100%;height:140px;font-size:12px;border:1px solid #E6E3DA;border-radius:8px;padding:10px;resize:none;background:#FAF9F5;margin-bottom:12px;"></textarea>
            <button id="fallback-copy-btn" onclick="copyFallbackText()"
                style="width:100%;padding:10px;border:none;border-radius:8px;background:#D97757;color:white;font-size:14px;font-weight:600;cursor:pointer;">
                複製到剪貼簿
            </button>
            <button class="pw-cancel" style="width:100%;margin-top:8px;" onclick="document.getElementById('mailto-fallback').style.display='none'">關閉</button>
        </div>
    </div>

    <script src="viewer.js"></script>
</body>
</html>
