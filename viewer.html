<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>WebBOM 查看器</title>
    <style>
        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #FAF9F5;
            overflow: hidden;
            height: 100vh;
        }

        /* ===== 載入畫面 ===== */
        #loading {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #FAF9F5; color: #87867F; font-size: 16px;
            transition: opacity 0.3s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 32px; height: 32px; border: 3px solid #E6E3DA; border-top-color: #D97757; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-error { color: #D97757; margin-top: 12px; display: none; font-size: 14px; }

        /* ===== 頂部欄 ===== */
        .topbar {
            display: flex; align-items: center; padding: 8px 16px;
            background: white; border-bottom: 1px solid #E6E3DA;
            gap: 12px; flex-shrink: 0;
        }
        .topbar .back-btn {
            background: none; border: 1px solid #E6E3DA; border-radius: 6px;
            padding: 6px 12px; cursor: pointer; font-size: 13px; color: #141413;
            white-space: nowrap; transition: background 0.2s;
        }
        .topbar .back-btn:hover { background: #F0EEE6; }
        .topbar h1 { font-size: 16px; color: #141413; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ===== 主容器（桌面左右分欄） ===== */
        .container { display: flex; height: calc(100vh - 45px); }

        /* ===== SVG 面板 ===== */
        .svg-panel {
            flex: 1; padding: 12px; background: white;
            border-right: 1px solid #E6E3DA;
            display: flex; flex-direction: column; min-width: 0;
        }
        .svg-container {
            flex: 1; position: relative;
            background: #F0EEE6; border-radius: 8px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
        }
        .svg-container svg {
            max-width: 100%; max-height: 100%;
            width: auto; height: auto;
        }

        /* ===== 零件標籤 ===== */
        .part-label {
            position: absolute; pointer-events: none; z-index: 1000;
            background: rgba(217, 119, 87, 0.95); color: white;
            padding: 4px 8px; border-radius: 6px;
            font-size: 11px; font-weight: bold;
            white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transform: translate(-50%, -50%);
            opacity: 0; transition: opacity 0.12s ease;
        }
        .part-label.show { opacity: 1; }

        /* ===== SVG 互動（純CSS，桌面hover + 手機touch） ===== */
        .svg-part {
            cursor: pointer;
            transition: filter 0.12s ease, transform 0.12s ease;
            transform-origin: center center;
            transform-box: fill-box;
            will-change: transform;
        }
        /* 桌面 hover — 使用 drop-shadow (桌面效能充足) */
        .svg-part:hover {
            filter: drop-shadow(0 0 10px rgba(217, 119, 87, 0.6));
            transform: scale(1.1);
        }
        .svg-part:hover path,
        .svg-part:hover circle,
        .svg-part:hover rect,
        .svg-part:hover ellipse,
        .svg-part:hover line {
            stroke: #D97757 !important;
            stroke-width: 3px !important;
            fill: rgba(217, 119, 87, 0.1) !important;
        }
        /* 選中 */
        .svg-part.selected {
            filter: drop-shadow(0 0 12px rgba(217, 119, 87, 0.8));
            transform: scale(1.1);
        }
        .svg-part.selected path,
        .svg-part.selected circle,
        .svg-part.selected rect,
        .svg-part.selected ellipse,
        .svg-part.selected line {
            stroke: #D97757 !important;
            stroke-width: 3px !important;
            fill: rgba(217, 119, 87, 0.1) !important;
        }
        /* 手機點擊高亮 — 不使用 drop-shadow (iOS Safari 效能問題) */
        .svg-part.tap-highlight {
            transform: scale(1.1);
        }
        .svg-part.tap-highlight path,
        .svg-part.tap-highlight circle,
        .svg-part.tap-highlight rect,
        .svg-part.tap-highlight ellipse,
        .svg-part.tap-highlight line {
            stroke: #D97757 !important;
            stroke-width: 3px !important;
            fill: rgba(217, 119, 87, 0.1) !important;
        }
        /* 行動版：全局禁用 SVG drop-shadow 以提升效能 */
        @media (max-width: 768px) {
            .svg-part:hover,
            .svg-part.selected {
                filter: none;
            }
        }

        /* ===== BOM 面板（桌面右側） ===== */
        .bom-panel {
            width: 380px; padding: 16px; background: white;
            overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
            flex-shrink: 0;
        }
        .bom-panel h2 { font-size: 16px; color: #141413; }

        /* 統計 */
        .stats-summary { background: #F0EEE6; padding: 12px; border-radius: 8px; }
        .stats-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #E6E3DA; }
        .stats-item:last-child { border-bottom: none; }

        /* 已選擇清單 */
        .selected-items { max-height: 180px; overflow-y: auto; }
        .selected-item {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 10px; margin: 4px 0;
            background: #E3DACC; border-radius: 6px; font-size: 12px;
        }
        .selected-item-info { flex: 1; min-width: 0; }
        .selected-item-info .part-name { font-size: 11px; color: #6B6A63; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .qty-input {
            width: 52px; padding: 3px 4px; border: 1px solid #C4BBA8; border-radius: 4px;
            font-size: 12px; text-align: center; background: white;
        }
        .remove-btn {
            background: #D97757; color: white; border: none; border-radius: 50%;
            width: 22px; height: 22px; cursor: pointer; font-size: 12px;
            flex-shrink: 0; line-height: 22px; text-align: center;
        }
        .remove-btn:hover { background: #B85C3E; }

        .email-btn {
            width: 100%; padding: 12px;
            background: #788C5D; color: white; border: none; border-radius: 8px;
            cursor: pointer; font-size: 14px; font-weight: 600;
            transition: background 0.3s;
        }
        .email-btn:hover { background: #657A4A; }
        .email-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* 搜索 + 工具欄 */
        .search-box {
            width: 100%; padding: 8px 12px; border: 1px solid #E6E3DA; border-radius: 6px;
            font-size: 13px; background: #FAF9F5; outline: none;
        }
        .search-box:focus { border-color: #D97757; }
        .bom-toolbar { display: flex; gap: 6px; }
        .bom-toolbar button {
            flex: 1; padding: 6px 10px; border: 1px solid #E6E3DA; border-radius: 6px;
            background: white; cursor: pointer; font-size: 12px; transition: background 0.2s;
        }
        .bom-toolbar button:hover { background: #E3DACC; }

        .bom-list-container { max-height: 280px; overflow-y: auto; border: 1px solid #E6E3DA; border-radius: 8px; }
        .bom-item {
            display: flex; align-items: center; padding: 10px 12px;
            border-bottom: 1px solid #E6E3DA; cursor: pointer; transition: background 0.15s;
        }
        .bom-item:last-child { border-bottom: none; }
        .bom-item:hover { background: #E3DACC; }
        .bom-item.selected { background: #D97757; color: white; }
        .bom-item.hidden { display: none; }
        .item-number {
            width: 24px; height: 24px; background: #E6E3DA; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; margin-right: 12px; flex-shrink: 0; color: #141413;
        }
        .bom-item.selected .item-number { background: white; color: #D97757; }
        .item-info { flex: 1; min-width: 0; }
        .part-number { font-weight: 600; font-size: 13px; }
        .part-name { font-size: 11px; color: #87867F; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bom-item.selected .part-name { color: rgba(255,255,255,0.85); }
        .part-qty { font-size: 11px; color: #87867F; }
        .bom-item.selected .part-qty { color: rgba(255,255,255,0.7); }

        /* ===== 手機底部 Tab 切換 ===== */
        .mobile-tabs { display: none; }

        /* ===== Toast ===== */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #141413; color: white; padding: 10px 20px; border-radius: 8px;
            font-size: 13px; opacity: 0; transition: opacity 0.3s ease; z-index: 9999; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        /* ===== 滾動條 ===== */
        .bom-list-container::-webkit-scrollbar,
        .selected-items::-webkit-scrollbar { width: 5px; }
        .bom-list-container::-webkit-scrollbar-track,
        .selected-items::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
        .bom-list-container::-webkit-scrollbar-thumb,
        .selected-items::-webkit-scrollbar-thumb { background: #D97757; border-radius: 3px; }

        /* ===== 行動版：<= 768px ===== */
        @media (max-width: 768px) {
            body { overflow: auto; }
            .container {
                flex-direction: column; height: auto;
                padding-bottom: 56px; /* 給底部tab留空間 */
            }
            .svg-panel {
                border-right: none; border-bottom: none;
                min-height: calc(100vh - 105px); padding: 0;
                display: flex;
            }
            .svg-container {
                min-height: 0; flex: 1; border-radius: 0;
                overflow: auto; touch-action: pinch-zoom pan-x pan-y;
                -webkit-overflow-scrolling: touch;
            }
            .svg-container svg {
                max-width: none; max-height: none;
                width: 100%; height: auto;
            }
            .bom-panel {
                width: 100%; padding: 12px;
                display: none;
            }
            .bom-panel.active { display: flex; }
            .bom-list-container { max-height: none; }

            /* 底部 Tab */
            .mobile-tabs {
                display: flex; position: fixed; bottom: 0; left: 0; right: 0;
                background: white; border-top: 1px solid #E6E3DA; z-index: 500;
                box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
                padding-bottom: env(safe-area-inset-bottom, 0px);
            }
            .mobile-tabs button {
                flex: 1; padding: 10px 4px; border: none; background: transparent;
                font-size: 12px; color: #87867F; cursor: pointer;
                transition: all 0.2s; position: relative;
                min-height: 44px; /* iOS HIG 最小觸摸目標 */
            }
            .mobile-tabs button.active { color: #D97757; font-weight: 600; }
            .mobile-tabs button.active::after {
                content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
                height: 3px; background: #D97757; border-radius: 3px 3px 0 0;
            }
            .mobile-tabs button .tab-icon { display: block; font-size: 16px; margin-bottom: 1px; }

            .topbar { padding: 6px 10px; }
            .topbar h1 { font-size: 13px; }
            .topbar .back-btn { padding: 4px 8px; font-size: 12px; }
        }

        /* ===== 小手機 (<= 480px) ===== */
        @media (max-width: 480px) {
            .svg-panel { min-height: calc(100vh - 100px); }
            .bom-panel { padding: 8px; }
            .bom-item { padding: 8px 10px; }
        }

        /* ===== 手機橫屏 ===== */
        @media (max-width: 900px) and (orientation: landscape) {
            .svg-panel {
                min-height: calc(100vh - 50px);
                padding: 4px;
            }
            .svg-container svg {
                width: auto; height: 100%;
                max-width: 100%;
            }
            .topbar { padding: 4px 8px; }
            .topbar h1 { font-size: 12px; }
            .mobile-tabs button { padding: 6px 4px; font-size: 11px; }
            .mobile-tabs button .tab-icon { font-size: 14px; }
        }

        /* ===== 管理員密碼彈窗 ===== */
        .pw-overlay {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(20,20,19,0.5); display: flex;
            align-items: center; justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .pw-dialog {
            background: white; border-radius: 12px; padding: 28px 24px;
            width: 300px; max-width: 90vw; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .pw-dialog h3 { font-size: 16px; color: #141413; margin-bottom: 6px; }
        .pw-dialog p { font-size: 12px; color: #87867F; margin-bottom: 16px; }
        .pw-dialog input {
            width: 100%; padding: 10px 12px; border: 1px solid #E6E3DA;
            border-radius: 8px; font-size: 14px; text-align: center; outline: none;
            margin-bottom: 12px;
        }
        .pw-dialog input:focus { border-color: #D97757; }
        .pw-dialog .pw-error { color: #D97757; font-size: 12px; margin-bottom: 8px; display: none; }
        .pw-dialog button {
            width: 100%; padding: 10px; border: none; border-radius: 8px;
            background: #788C5D; color: white; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .pw-dialog button:hover { background: #657A4A; }
        .pw-dialog .pw-cancel {
            background: none; color: #87867F; font-weight: 400; margin-top: 8px;
        }
        .pw-dialog .pw-cancel:hover { background: #F0EEE6; }

    </style>
    <script src="analytics.js"></script>
</head>
<body>

    <!-- 載入畫面 -->
    <div id="loading">
        <div class="spinner"></div>
        <span id="loading-text">載入產品資料...</span>
        <div id="loading-error"></div>
    </div>

    <!-- 頂部欄 -->
    <div class="topbar">
        <button class="back-btn" onclick="goBack()">← 產品列表</button>
        <h1 id="product-title">載入中...</h1>
        <button class="back-btn" onclick="shareProduct()" title="分享此產品">🔗</button>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- SVG 面板 -->
        <div class="svg-panel" id="svg-panel">
            <div class="svg-container" id="svg-container">
                <div style="text-align:center;padding:20px;color:#87867F;font-size:14px;">載入爆炸圖...</div>
            </div>
        </div>

        <!-- BOM 面板 -->
        <div class="bom-panel" id="bom-panel">
            <!-- 統計 -->
            <div>
                <h2>詢價統計</h2>
                <div class="stats-summary">
                    <div class="stats-item"><span>已選擇</span><strong id="selected-count">0</strong></div>
                    <div class="stats-item"><span>總數量</span><strong id="total-quantity">0</strong></div>
                </div>
            </div>

            <!-- 已選擇 -->
            <div>
                <h2>已選擇零件</h2>
                <div class="selected-items" id="selected-list"></div>
            </div>

            <!-- 收件信箱 -->
            <div style="margin-bottom:8px;">
                <label style="font-size:12px;color:#87867F;display:block;margin-bottom:4px;">詢價收件信箱</label>
                <div style="display:flex;gap:6px;">
                    <input type="email" class="search-box" id="email-input" value="sales@example.com"
                        style="flex:1;margin-bottom:0;" placeholder="輸入郵箱...">
                    <button onclick="saveEmail()" style="padding:8px 12px;border:1px solid #E6E3DA;border-radius:6px;background:white;cursor:pointer;font-size:12px;white-space:nowrap;">儲存</button>
                </div>
            </div>

            <!-- 發送按鈕 -->
            <button class="email-btn" onclick="sendInquiry()" id="email-btn" disabled>發送詢價郵件</button>

            <!-- BOM 清單 -->
            <div>
                <h2>零件清單</h2>
                <input type="text" class="search-box" id="search-box" placeholder="搜尋編號或名稱..." oninput="filterBOM()">
                <div class="bom-toolbar">
                    <button onclick="selectAll()">全選</button>
                    <button onclick="clearAll()">清除</button>
                </div>
                <div class="bom-list-container"><div id="bom-list"></div></div>
            </div>

            <!-- 採購統計（默認隱藏，由 tab 切換） -->
            <div id="stats-panel" style="display:none;">
                <h2>採購統計</h2>
                <div id="stats-loading" style="text-align:center;padding:20px;color:#87867F;">載入統計資料...</div>
                <div id="stats-content" style="display:none;">
                    <!-- 高頻零件 -->
                    <div style="margin-bottom:16px;">
                        <h3 style="font-size:14px;color:#D97757;margin-bottom:8px;">🔥 高頻購買零件 TOP 5</h3>
                        <div id="hot-parts-list" style="background:#F0EEE6;border-radius:8px;padding:8px;"></div>
                    </div>
                    <!-- 客戶排名 -->
                    <div style="margin-bottom:16px;">
                        <h3 style="font-size:14px;color:#141413;margin-bottom:8px;">🏢 客戶購買排名</h3>
                        <div id="customer-stats" style="background:#F0EEE6;border-radius:8px;padding:8px;"></div>
                    </div>
                    <!-- 月度趨勢 -->
                    <div style="margin-bottom:16px;">
                        <h3 style="font-size:14px;color:#141413;margin-bottom:8px;">📈 月度購買趨勢</h3>
                        <div id="monthly-stats" style="background:#F0EEE6;border-radius:8px;padding:8px;"></div>
                    </div>
                </div>
                <div id="stats-empty" style="display:none;text-align:center;padding:40px;color:#87867F;font-size:14px;">
                    暫無採購數據<br>
                    <small>請在 data/purchases/ 目錄下添加採購記錄 CSV</small>
                </div>
            </div>
        </div>
    </div>

    <!-- 手機底部 Tab -->
    <div class="mobile-tabs" id="mobile-tabs">
        <button class="active" onclick="switchTab('svg')">
            <span class="tab-icon">🔍</span> 爆炸圖
        </button>
        <button onclick="switchTab('bom')">
            <span class="tab-icon">📋</span> 零件清單
        </button>
        <button onclick="switchTab('stats')" id="stats-tab-btn">
            <span class="tab-icon" id="stats-tab-icon">🔒</span> 採購統計
        </button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 管理員密碼彈窗 -->
    <div class="pw-overlay" id="pw-overlay" style="display:none;">
        <div class="pw-dialog">
            <h3>🔒 管理員驗證</h3>
            <p>採購統計僅限管理員查看</p>
            <input type="password" id="pw-input" placeholder="請輸入管理密碼" autocomplete="off">
            <div class="pw-error" id="pw-error">密碼錯誤，請重試</div>
            <button onclick="verifyAdmin()">確認</button>
            <button class="pw-cancel" onclick="closePwModal()">取消</button>
        </div>
    </div>

    <!-- Android mailto 備用方案 -->
    <div class="pw-overlay" id="mailto-fallback" style="display:none;">
        <div class="pw-dialog" style="width:360px;max-width:90vw;text-align:left;">
            <h3 style="text-align:center;">發送詢價</h3>
            <p style="text-align:center;margin:4px 0 12px;">請複製以下資訊寄送到：<br><strong id="fallback-email"></strong></p>
            <textarea id="fallback-text" readonly
                style="width:100%;height:140px;font-size:12px;border:1px solid #E6E3DA;border-radius:8px;padding:10px;resize:none;background:#FAF9F5;margin-bottom:12px;"></textarea>
            <button id="fallback-copy-btn" onclick="copyFallbackText()"
                style="width:100%;padding:10px;border:none;border-radius:8px;background:#D97757;color:white;font-size:14px;font-weight:600;cursor:pointer;">
                複製到剪貼簿
            </button>
            <button class="pw-cancel" style="width:100%;margin-top:8px;" onclick="document.getElementById('mailto-fallback').style.display='none'">關閉</button>
        </div>
    </div>


    <script>
    // ========================================================================
    // 1. 全局狀態
    // ========================================================================
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('product') || 'p-type';
    let bomData = [];
    let selectedParts = new Map();
    const partLabels = new Map();
    let bomInitialized = false;
    let currentTab = 'svg';
    let productConfig = null;

    // ========================================================================
    // 2. 工具函數
    // ========================================================================
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function svgPointToContainer(svgEl, containerEl, svgX, svgY) {
        const svgRect = svgEl.getBoundingClientRect();
        const containerRect = containerEl.getBoundingClientRect();
        const viewBox = svgEl.viewBox.baseVal;
        return {
            left: svgX * (svgRect.width / viewBox.width) + (svgRect.left - containerRect.left),
            top: svgY * (svgRect.height / viewBox.height) + (svgRect.top - containerRect.top)
        };
    }

    // CSV 解析（支援中英文欄位名）
    function parseCSV(text) {
        const lines = text.trim().split('\n').filter(l => l.trim() && !l.startsWith('#'));
        if (lines.length < 2) return [];
        const headers = lines[0].split(',').map(h => h.trim());
        return lines.slice(1).map(line => {
            const vals = line.split(',').map(v => v.trim());
            const row = {};
            headers.forEach((h, i) => { if (i < vals.length) row[h] = vals[i]; });
            return row;
        });
    }

    function normalizeBOMData(rows) {
        return rows.map((row, idx) => {
            // 支持多種欄位名
            const id = row.Id || row.ID || row.標籤ID || 'P' + String(idx + 1).padStart(2, '0');
            const itemNo = parseInt(row.ItemNo || row.項次 || row['#'] || (idx + 1), 10);
            const partNumber = row.PartNumber || row.料品編號 || row['Part No.'] || '';
            const name = row.Name || row.品名 || row.Description || '';
            const quantity = parseInt(row.Quantity || row.數量 || row.Qty || row['單 位 數 量'] || '1', 10);
            return { id, itemNo, partNumber, name, quantity };
        });
    }

    // ========================================================================
    // 3. 產品載入
    // ========================================================================
    async function loadProduct() {
        try {
            // 載入 products.json
            const manifestRes = await fetch('./products.json');
            if (!manifestRes.ok) throw new Error('無法載入產品清單');
            const manifest = await manifestRes.json();

            productConfig = manifest.products.find(p => p.id === productId);
            if (!productConfig) throw new Error('找不到產品: ' + productId);

            document.getElementById('product-title').textContent = productConfig.name;

            // 解析收件信箱：products.json 全局 > 產品級別 > localStorage > 默認
            const globalEmail = manifest.emailTo || '';
            const productEmail = productConfig.emailTo || '';
            const savedEmail = localStorage.getItem('webBom_emailTo') || '';
            const finalEmail = savedEmail || productEmail || globalEmail || 'sales@example.com';
            document.getElementById('email-input').value = finalEmail;

            // 載入 BOM CSV
            document.getElementById('loading-text').textContent = '載入零件清單...';
            const bomRes = await fetch(productConfig.bom);
            if (!bomRes.ok) throw new Error('無法載入 BOM 資料');
            const csvText = await bomRes.text();
            const rows = parseCSV(csvText);
            bomData = normalizeBOMData(rows);
            if (bomData.length === 0) throw new Error('BOM 資料為空');

            // 載入 SVG
            document.getElementById('loading-text').textContent = '載入爆炸圖...';
            const svgRes = await fetch(productConfig.svg);
            if (!svgRes.ok) throw new Error('無法載入爆炸圖 SVG');
            const svgContent = await svgRes.text();

            // 渲染
            document.getElementById('svg-container').innerHTML = svgContent;
            document.getElementById('loading').classList.add('hidden');

            // 處理 SVG
            processSVGAfterLoad();

            // Analytics: 頁面載入成功
            if (window.WebBOMAnalytics) {
                window.WebBOMAnalytics.pageview(productId);
            }

        } catch (err) {
            document.getElementById('loading-error').textContent = '錯誤：' + err.message;
            document.getElementById('loading-error').style.display = 'block';
            document.getElementById('loading-text').textContent = '載入失敗';
            // Analytics: 載入失敗
            if (window.WebBOMAnalytics) {
                window.WebBOMAnalytics.error('Product load failed: ' + err.message, err.stack, '', 0, 0);
            }
        }
    }

    // ========================================================================
    // 4. BOM 清單
    // ========================================================================
    function initBOMList() {
        const bomList = document.getElementById('bom-list');
        bomList.innerHTML = '';
        bomData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'bom-item';
            div.dataset.partId = item.id;
            div.innerHTML = `
                <div class="item-number">${item.itemNo || (index + 1)}</div>
                <div class="item-info">
                    <div class="part-number">${item.partNumber}</div>
                    <div class="part-name">${item.name}</div>
                    <div class="part-qty">數量: ${item.quantity}</div>
                </div>`;
            div.addEventListener('click', () => togglePartSelection(item.id));
            bomList.appendChild(div);
        });
        bomInitialized = true;
    }

    window.filterBOM = function() {
        const q = document.getElementById('search-box').value.trim().toLowerCase();
        document.querySelectorAll('.bom-item').forEach(el => {
            el.classList.toggle('hidden', q !== '' && !el.textContent.toLowerCase().includes(q));
        });
    };

    window.selectAll = function() {
        bomData.forEach(item => {
            if (!selectedParts.has(item.id)) {
                selectedParts.set(item.id, { part: item, customQty: item.quantity });
                updateBOMSelection(item.id, true);
                updateSVGSelection(item.id, true);
            }
        });
        updateStats();
        showToast('已全選 ' + selectedParts.size + ' 個零件');
    };

    window.clearAll = function() {
        selectedParts.forEach((_, pid) => {
            updateBOMSelection(pid, false);
            updateSVGSelection(pid, false);
        });
        selectedParts.clear();
        updateStats();
    };

    // ========================================================================
    // 5. 選擇邏輯
    // ========================================================================
    function togglePartSelection(partId) {
        if (selectedParts.has(partId)) {
            selectedParts.delete(partId);
            updateBOMSelection(partId, false);
            updateSVGSelection(partId, false);
            // Analytics
            if (window.WebBOMAnalytics) {
                const p = bomData.find(item => item.id === partId);
                window.WebBOMAnalytics.select('remove', p || { id: partId });
            }
        } else {
            const part = bomData.find(p => p.id === partId);
            if (part) {
                selectedParts.set(partId, { part, customQty: part.quantity });
                updateBOMSelection(partId, true);
                updateSVGSelection(partId, true);
                // Analytics
                if (window.WebBOMAnalytics) {
                    window.WebBOMAnalytics.select('add', part);
                }
            }
        }
        updateStats();
    }

    function updateBOMSelection(partId, selected) {
        const el = document.querySelector(`[data-part-id="${partId}"]`);
        if (el) el.classList.toggle('selected', selected);
    }

    function updateSVGSelection(partId, selected) {
        document.querySelectorAll(`[data-part-id="${partId}"]`).forEach(el => {
            el.classList.toggle('selected', selected);
        });
    }

    function updateStats() {
        let totalQty = 0;
        selectedParts.forEach(e => { totalQty += e.customQty; });
        document.getElementById('selected-count').textContent = selectedParts.size;
        document.getElementById('total-quantity').textContent = totalQty;

        const list = document.getElementById('selected-list');
        list.innerHTML = '';
        selectedParts.forEach((entry, partId) => {
            const p = entry.part;
            const div = document.createElement('div');
            div.className = 'selected-item';
            div.innerHTML = `
                <div class="selected-item-info">
                    <div style="font-weight:600;font-size:12px;">${p.partNumber}</div>
                    <div class="part-name">${p.name}</div>
                </div>
                <input type="number" class="qty-input" value="${entry.customQty}" min="1"
                    data-part-id="${partId}" onchange="updateQty('${partId}',this.value)">
                <button class="remove-btn" onclick="removePart('${partId}')">×</button>`;
            list.appendChild(div);
        });
        document.getElementById('email-btn').disabled = selectedParts.size === 0;
    }

    window.updateQty = function(partId, val) {
        const qty = parseInt(val, 10);
        if (qty > 0 && selectedParts.has(partId)) {
            selectedParts.set(partId, { ...selectedParts.get(partId), customQty: qty });
            updateStats();
        }
    };

    window.removePart = function(partId) {
        selectedParts.delete(partId);
        updateBOMSelection(partId, false);
        updateSVGSelection(partId, false);
        updateStats();
    };

    // ========================================================================
    // 6. 發送詢價 & 信箱設定
    // ========================================================================
    window.sendInquiry = function() {
        if (selectedParts.size === 0) return;
        const subject = encodeURIComponent(
            (productConfig ? productConfig.name + ' - ' : '') + '零件詢價請求 ' + new Date().toLocaleDateString('zh-TW')
        );
        let lines = ['尊敬的售後部門，', '', '請為以下零件提供報價：', ''];
        selectedParts.forEach(e => {
            const p = e.part;
            lines.push('• ' + p.partNumber + ' - ' + p.name + ' (數量: ' + e.customQty + ')');
        });
        const total = Array.from(selectedParts.values()).reduce((s, e) => s + e.customQty, 0);
        lines.push('');
        lines.push('總計：' + selectedParts.size + ' 種，共 ' + total + ' 件');
        lines.push('', '請盡快回覆報價，謝謝！', '', '此致', '敬禮');
        const body = encodeURIComponent(lines.join('\n'));

        if (confirm('即將打開郵件客戶端，發送 ' + selectedParts.size + ' 種零件（共 ' + total + ' 件）的詢價請求？')) {
            const emailTo = document.getElementById('email-input').value.trim();
            // Analytics
            if (window.WebBOMAnalytics) {
                window.WebBOMAnalytics.inquiry({
                    totalParts: selectedParts.size,
                    totalQty: total,
                    emailDomain: emailTo.split('@')[1] || emailTo,
                    partNumbers: Array.from(selectedParts.keys())
                });
            }
            // mailto: 連結
            var mailtoUrl = 'mailto:' + encodeURIComponent(emailTo) + '?subject=' + subject + '&body=' + body;

            // Android Chrome 偵測：若無郵件客戶端，mailto 可能無效
            var isAndroid = /Android/.test(navigator.userAgent);
            if (isAndroid) {
                // 嘗試 mailto，同時顯示備用方案
                showMailtoFallback(emailTo, lines.join('\n'), mailtoUrl);
            } else {
                window.location.href = mailtoUrl;
            }
        }
    };

    // Android mailto 備用方案
    window._fallbackMailtoUrl = '';

    window.showMailtoFallback = function(email, text, mailtoUrl) {
        document.getElementById('fallback-email').textContent = email;
        document.getElementById('fallback-text').value = text;
        document.getElementById('mailto-fallback').style.display = 'flex';
        window._fallbackMailtoUrl = mailtoUrl;
        // 仍然嘗試打開 mailto
        setTimeout(function() {
            window.location.href = mailtoUrl;
        }, 100);
    };

    window.copyFallbackText = function() {
        var text = document.getElementById('fallback-text').value;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() {
                var btn = document.getElementById('fallback-copy-btn');
                btn.textContent = '已複製！';
                btn.style.background = '#788C5D';
                setTimeout(function() {
                    btn.textContent = '複製到剪貼簿';
                    btn.style.background = '#D97757';
                }, 2000);
            });
        } else {
            // 降級方案：選中文字手動複製
            var ta = document.getElementById('fallback-text');
            ta.select();
            ta.setSelectionRange(0, 99999);
            showToast('請手動複製詢價內容');
        }
    };

    // 儲存收件信箱到 localStorage
    window.saveEmail = function() {
        const email = document.getElementById('email-input').value.trim();
        if (email) {
            localStorage.setItem('webBom_emailTo', email);
            showToast('收件信箱已儲存：' + email);
        } else {
            showToast('請輸入有效的郵箱地址');
        }
    };

    // ========================================================================
    // 7. SVG 處理
    // ========================================================================
    function processSVGAfterLoad() {
        const svg = document.querySelector('#svg-container svg');
        const container = document.querySelector('.svg-container');
        if (!svg) return;

        const isMobile = window.innerWidth <= 768;
        svg.style.width = '100%';
        svg.style.height = isMobile ? 'auto' : 'auto';
        if (!isMobile) svg.style.maxHeight = '100%';
        svg.style.preserveAspectRatio = isMobile ? 'xMinYMin meet' : 'xMidYMid meet';

        requestAnimationFrame(() => {
            // 統一路徑樣式
            svg.querySelectorAll('path, circle, rect, ellipse, line').forEach(path => {
                path.style.stroke = '#141413';
                path.style.strokeWidth = '2px';
                path.style.fill = 'none';
            });

            let foundParts = 0;
            svg.querySelectorAll('g').forEach(group => {
                let partId = null;
                for (let i = 0; i < group.attributes.length; i++) {
                    const attr = group.attributes[i];
                    if (attr.name === 'inkscape:label' && attr.value) {
                        const dash = attr.value.indexOf('-');
                        if (dash > 0) {
                            const cand = attr.value.substring(0, dash);
                            if (cand.startsWith('P')) { partId = cand; break; }
                        }
                    }
                }
                if (!partId) return;
                const partData = bomData.find(d => d.id === partId);
                if (!partData) return;

                group.setAttribute('data-part-id', partId);
                group.classList.add('svg-part');

                // 浮動標籤
                const label = document.createElement('div');
                label.className = 'part-label';
                label.textContent = partData.id + ' - ' + partData.partNumber;
                label.id = 'label-' + partId;
                try {
                    const bbox = group.getBBox();
                    const pos = svgPointToContainer(svg, container, bbox.x + bbox.width / 2, bbox.y + bbox.height / 2);
                    label.style.left = pos.left + 'px';
                    label.style.top = pos.top + 'px';
                } catch (e) {
                    label.style.left = '50%';
                    label.style.top = '50%';
                }
                container.appendChild(label);
                partLabels.set(partId, label);

                group.addEventListener('click', () => {
                    togglePartSelection(partId);
                    // 手機上：點擊後顯示標籤 1.2 秒作為反饋
                    if (window.innerWidth <= 768) {
                        const el = partLabels.get(partId);
                        if (el) {
                            el.classList.add('show');
                            clearTimeout(el._hideTimer);
                            el._hideTimer = setTimeout(() => el.classList.remove('show'), 1200);
                        }
                        // 短暫高亮動畫
                        group.classList.add('tap-highlight');
                        setTimeout(() => group.classList.remove('tap-highlight'), 400);
                    }
                });

                // 標籤 hover/離開（桌面用）
                group.addEventListener('mouseenter', () => {
                    const el = partLabels.get(partId);
                    if (el) el.classList.add('show');
                });
                group.addEventListener('mouseleave', () => {
                    const el = partLabels.get(partId);
                    if (el) el.classList.remove('show');
                });
                foundParts++;
            });

            console.log('已處理', foundParts, '個零件');
            if (!bomInitialized) { initBOMList(); }

            // resize 重新定位標籤
            let timer;
            window.addEventListener('resize', () => {
                clearTimeout(timer);
                timer = setTimeout(() => updateLabels(svg, container), 200);
            });
        });
    }

    function updateLabels(svg, container) {
        bomData.forEach(item => {
            const labelEl = partLabels.get(item.id);
            if (!labelEl) return;
            const g = document.querySelector(`g[data-part-id="${item.id}"]`);
            if (!g) return;
            try {
                const b = g.getBBox();
                const pos = svgPointToContainer(svg, container, b.x + b.width / 2, b.y + b.height / 2);
                labelEl.style.left = pos.left + 'px';
                labelEl.style.top = pos.top + 'px';
            } catch (e) { /* ignore */ }
        });
    }

    // ========================================================================
    // 8. 手機 Tab 切換
    // ========================================================================
    // 管理員驗證
    const ADMIN_PASSWORD = 'webom2024';

    window._isAdmin = function() { return sessionStorage.getItem('webBom_admin') === '1'; };

    window.verifyAdmin = function() {
        const input = document.getElementById('pw-input');
        const err = document.getElementById('pw-error');
        if (input.value === ADMIN_PASSWORD) {
            sessionStorage.setItem('webBom_admin', '1');
            closePwModal();
            document.getElementById('stats-tab-icon').textContent = '📊';
            switchTab('stats');
        } else {
            err.style.display = 'block';
            input.value = '';
            input.focus();
        }
    };

    window.closePwModal = function() {
        document.getElementById('pw-overlay').style.display = 'none';
        document.getElementById('pw-error').style.display = 'none';
        document.getElementById('pw-input').value = '';
        // 回到上一個 tab
        if (currentTab === 'svg') switchTab('svg');
        else switchTab('bom');
    };

    window.switchTab = function(tab) {
        if (tab === 'stats' && !_isAdmin()) {
            document.getElementById('pw-overlay').style.display = 'flex';
            document.getElementById('pw-input').focus();
            // 不切換 tab，停在目前頁面
            return;
        }
        currentTab = tab;
        // 更新 icon
        if (_isAdmin()) document.getElementById('stats-tab-icon').textContent = '📊';
        document.querySelectorAll('.mobile-tabs button').forEach(b => {
            const txt = b.textContent;
            if (tab === 'svg') b.classList.toggle('active', txt.includes('爆炸'));
            else if (tab === 'bom') b.classList.toggle('active', txt.includes('零件'));
            else b.classList.toggle('active', txt.includes('採購'));
        });
        document.getElementById('svg-panel').style.display = tab === 'svg' ? 'flex' : 'none';
        document.getElementById('bom-panel').classList.toggle('active', tab === 'bom' || tab === 'stats');
        document.getElementById('stats-panel').style.display = tab === 'stats' ? 'block' : 'none';
        if (tab === 'stats' && !window._statsLoaded) {
            loadStats();
        }
    };

    // ========================================================================
    // 9. 返回
    // ========================================================================
    window.goBack = function() {
        window.location.href = './index.html';
    };

    window.shareProduct = function() {
        var url = window.location.href;
        var title = (productConfig ? productConfig.name : 'WebBOM') + ' - 零件詢價';
        if (navigator.share) {
            navigator.share({
                title: title,
                text: '查看 ' + (productConfig ? productConfig.name : '產品') + ' 的爆炸圖與 BOM 零件清單',
                url: url
            }).catch(function() {});
        } else if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(function() {
                showToast('產品連結已複製到剪貼簿');
            });
        } else {
            prompt('請複製以下網址分享此產品：', url);
        }
    };

    // ========================================================================
    // 10. 採購統計載入
    // ========================================================================
    async function loadStats() {
        const loading = document.getElementById('stats-loading');
        const content = document.getElementById('stats-content');
        const empty = document.getElementById('stats-empty');

        try {
            const res = await fetch('./data/stats.json');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const allStats = await res.json();
            const stats = allStats[productId];

            if (!stats || !stats.hotParts || stats.hotParts.length === 0) {
                loading.style.display = 'none';
                empty.style.display = 'block';
                window._statsLoaded = true;
                return;
            }

            // 高頻零件 TOP 5
            const hotList = document.getElementById('hot-parts-list');
            hotList.innerHTML = stats.hotParts.slice(0, 5).map((p, i) => `
                <div style="display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #E6E3DA;font-size:12px;${i===0?'font-weight:600;color:#D97757':''}">
                    <span style="width:24px;text-align:center;">${['🥇','🥈','🥉','4','5'][i]}</span>
                    <span style="flex:1;margin:0 8px;">${p.partNumber}</span>
                    <span style="color:#87867F;">${p.totalQty}件 / ${p.orderCount}次</span>
                </div>
            `).join('');

            // 客戶排名
            const custList = document.getElementById('customer-stats');
            custList.innerHTML = stats.topCustomers.slice(0, 5).map((c, i) => `
                <div style="display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #E6E3DA;font-size:12px;">
                    <span style="width:24px;text-align:center;color:#87867F;">${i+1}</span>
                    <span style="flex:1;margin:0 8px;">${c.name}</span>
                    <span style="color:#87867F;">${c.orderCount}次 / ${c.totalQty}件</span>
                </div>
            `).join('');

            // 月度趨勢（長條圖模擬）
            const monthlyList = document.getElementById('monthly-stats');
            const maxQty = Math.max(...stats.monthlyStats.map(m => m.totalQty), 1);
            monthlyList.innerHTML = stats.monthlyStats.map(m => {
                const pct = (m.totalQty / maxQty * 100).toFixed(0);
                return `
                    <div style="display:flex;align-items:center;padding:4px 0;font-size:12px;">
                        <span style="width:60px;color:#87867F;">${m.month}</span>
                        <div style="flex:1;height:18px;background:#E6E3DA;border-radius:4px;overflow:hidden;margin:0 8px;">
                            <div style="height:100%;width:${pct}%;background:#D97757;border-radius:4px;"></div>
                        </div>
                        <span style="width:50px;text-align:right;color:#141413;">${m.totalQty}</span>
                    </div>
                `;
            }).join('');

            loading.style.display = 'none';
            content.style.display = 'block';
            window._statsLoaded = true;

        } catch (err) {
            loading.textContent = '無法載入統計資料：' + err.message;
        }
    }

    // ========================================================================
    // 11. 啟動
    // ========================================================================
    loadProduct();
    </script>
