<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WebBOM 產品列表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FAF9F5; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .header {
            background: white; border-bottom: 1px solid #E6E3DA;
            padding: 20px 24px; text-align: center;
        }
        .header h1 { font-size: 22px; color: #141413; margin-bottom: 4px; }
        .header p { font-size: 14px; color: #87867F; }

        .grid {
            flex: 1; padding: 24px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px; max-width: 1200px; margin: 0 auto; width: 100%;
        }

        .product-card {
            background: white; border-radius: 12px;
            border: 1px solid #E6E3DA; overflow: hidden;
            cursor: pointer; transition: all 0.2s ease;
        }
        .product-card:hover {
            border-color: #D97757; box-shadow: 0 4px 16px rgba(217,119,87,0.15);
            transform: translateY(-2px);
        }
        .product-card:active { transform: scale(0.98); }

        .card-preview {
            height: 180px; background: #F0EEE6;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: #D97757;
            position: relative; overflow: hidden;
        }
        .card-preview img, .card-preview svg {
            width: 100%; height: 100%; object-fit: contain; padding: 16px;
        }

        .card-body {
            padding: 16px; border-top: 1px solid #E6E3DA;
        }
        .card-body h3 { font-size: 16px; color: #141413; margin-bottom: 4px; }
        .card-body .model { font-size: 12px; color: #87867F; margin-bottom: 8px; }
        .card-body .meta { display: flex; gap: 12px; font-size: 12px; color: #87867F; }
        .card-body .meta span { display: flex; align-items: center; gap: 4px; }

        .empty-state {
            grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #87867F;
        }
        .empty-state h2 { font-size: 18px; margin-bottom: 8px; }

        #loading {
            grid-column: 1 / -1; text-align: center; padding: 60px;
            color: #87867F;
        }
        .spinner {
            width: 28px; height: 28px; border: 3px solid #E6E3DA;
            border-top-color: #D97757; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .header { padding: 16px; }
            .header h1 { font-size: 18px; }
            .grid { padding: 12px; grid-template-columns: 1fr; gap: 12px; }
            .card-preview { height: 140px; }
        }
    </style>
    <script src="analytics.js"></script>
</head>
<body>
    <div class="header">
        <h1>🔧 齒輪箱零件詢價系統</h1>
        <p>選擇產品查看爆炸圖與 BOM 清單</p>
        <div style="margin-top:12px;display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;">
            <button id="share-btn" onclick="sharePage()" style="padding:8px 16px;border:1px solid #E6E3DA;border-radius:8px;background:white;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;transition:background 0.2s;">
                <span>🔗</span> 分享此頁面
            </button>
            <button id="qr-btn" onclick="toggleQR()" style="padding:8px 16px;border:1px solid #E6E3DA;border-radius:8px;background:white;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;transition:background 0.2s;">
                <span>📱</span> 顯示 QR Code
            </button>
        </div>
        <div id="qr-container" style="display:none;margin-top:12px;text-align:center;">
            <canvas id="qr-canvas" style="border:8px solid white;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);"></canvas>
            <p style="font-size:11px;color:#87867F;margin-top:6px;">掃描 QR Code 在手機上打開</p>
        </div>
    </div>

    <div class="grid" id="product-grid">
        <div id="loading">
            <div class="spinner"></div>
            <span>載入產品清單...</span>
        </div>
    </div>

    <script>
    async function loadProducts() {
        try {
            const res = await fetch('./products.json');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const manifest = await res.json();

            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            if (!manifest.products || manifest.products.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h2>暫無產品</h2><p>請在 products.json 中添加產品</p></div>';
                return;
            }

            // 顯示產品卡片（不預載SVG，加快手機加載速度）
            manifest.products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                // 提取型號縮寫做為預覽文字
                const modelHint = (product.model || product.id).substring(0, 6).toUpperCase();
                card.innerHTML = `
                    <div class="card-preview" style="font-size:48px;color:#D97757;background:#F0EEE6;">
                        ⚙ ${modelHint}
                    </div>
                    <div class="card-body">
                        <h3>${product.name}</h3>
                        <div class="model">型號: ${product.model || product.id}</div>
                    </div>
                `;
                card.addEventListener('click', () => {
                    window.location.href = './viewer.html?product=' + encodeURIComponent(product.id);
                });
                grid.appendChild(card);
            });

            // Analytics: 產品列表載入成功
            if (window.WebBOMAnalytics) {
                window.WebBOMAnalytics.pageview('index');
            }

        } catch (err) {
            document.getElementById('product-grid').innerHTML =
                '<div class="empty-state"><h2>無法載入產品清單</h2><p>' + err.message + '</p></div>';
            if (window.WebBOMAnalytics) {
                window.WebBOMAnalytics.error('Product list load failed: ' + err.message, err.stack, '', 0, 0);
            }
        }
    }

    loadProducts();

    // ============================================================
    // QR Code & 分享功能
    // ============================================================
    var qrShown = false;

    window.toggleQR = function() {
        var container = document.getElementById('qr-container');
        qrShown = !qrShown;
        container.style.display = qrShown ? 'block' : 'none';
        if (qrShown) { generateQR(); }
    };

    window.generateQR = function() {
        var canvas = document.getElementById('qr-canvas');
        if (canvas.dataset.generated) return;
        canvas.dataset.generated = '1';

        var url = window.location.href;
        var size = 200;

        // 使用 QR Server API (免費、無需 API Key)
        var img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() {
            canvas.width = size;
            canvas.height = size;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, size, size);
        };
        img.onerror = function() {
            // fallback: 顯示 URL 文字
            canvas.width = size;
            canvas.height = size;
            var ctx = canvas.getContext('2d');
            ctx.fillStyle = '#FAF9F5';
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#87867F';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('QR Code 載入失敗', size/2, size/2 - 10);
            ctx.fillText('請複製網址', size/2, size/2 + 10);
        };
        img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&data=' + encodeURIComponent(url) + '&margin=10';
    };

    window.sharePage = function() {
        var url = window.location.href;
        // 優先使用 Web Share API (行動裝置原生分享)
        if (navigator.share) {
            navigator.share({
                title: 'WebBOM 齒輪箱零件詢價系統',
                text: '查看齒輪箱爆炸圖與 BOM 零件清單',
                url: url
            }).catch(function() {});
        } else if (navigator.clipboard && navigator.clipboard.writeText) {
            // 桌面端：複製到剪貼簿
            navigator.clipboard.writeText(url).then(function() {
                var btn = document.getElementById('share-btn');
                var origHTML = btn.innerHTML;
                btn.innerHTML = '<span>✅</span> 已複製！';
                btn.style.background = '#788C5D';
                btn.style.color = 'white';
                setTimeout(function() {
                    btn.innerHTML = origHTML;
                    btn.style.background = 'white';
                    btn.style.color = '#141413';
                }, 2000);
            });
        } else {
            // 降級：選中並提示手動複製
            prompt('請複製以下網址：', url);
        }
    };
    </script>
</body>
</html>
