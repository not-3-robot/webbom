<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBOM 產品列表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FAF9F5; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .header {
            background: white; border-bottom: 1px solid #E6E3DA;
            padding: 20px 24px; text-align: center;
        }
        .header h1 { font-size: 22px; color: #141413; margin-bottom: 4px; }
        .header p { font-size: 14px; color: #87867F; }

        .grid {
            flex: 1; padding: 24px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px; max-width: 1200px; margin: 0 auto; width: 100%;
        }

        .product-card {
            background: white; border-radius: 12px;
            border: 1px solid #E6E3DA; overflow: hidden;
            cursor: pointer; transition: all 0.2s ease;
        }
        .product-card:hover {
            border-color: #D97757; box-shadow: 0 4px 16px rgba(217,119,87,0.15);
            transform: translateY(-2px);
        }
        .product-card:active { transform: scale(0.98); }

        .card-preview {
            height: 180px; background: #F0EEE6;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: #D97757;
            position: relative; overflow: hidden;
        }
        .card-preview img, .card-preview svg {
            width: 100%; height: 100%; object-fit: contain; padding: 16px;
        }

        .card-body {
            padding: 16px; border-top: 1px solid #E6E3DA;
        }
        .card-body h3 { font-size: 16px; color: #141413; margin-bottom: 4px; }
        .card-body .model { font-size: 12px; color: #87867F; margin-bottom: 8px; }
        .card-body .meta { display: flex; gap: 12px; font-size: 12px; color: #87867F; }
        .card-body .meta span { display: flex; align-items: center; gap: 4px; }

        .empty-state {
            grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #87867F;
        }
        .empty-state h2 { font-size: 18px; margin-bottom: 8px; }

        #loading {
            grid-column: 1 / -1; text-align: center; padding: 60px;
            color: #87867F;
        }
        .spinner {
            width: 28px; height: 28px; border: 3px solid #E6E3DA;
            border-top-color: #D97757; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .header { padding: 16px; }
            .header h1 { font-size: 18px; }
            .grid { padding: 12px; grid-template-columns: 1fr; gap: 12px; }
            .card-preview { height: 140px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 齒輪箱零件詢價系統</h1>
        <p>選擇產品查看爆炸圖與 BOM 清單</p>
    </div>

    <div class="grid" id="product-grid">
        <div id="loading">
            <div class="spinner"></div>
            <span>載入產品清單...</span>
        </div>
    </div>

    <script>
    async function loadProducts() {
        try {
            const res = await fetch('./products.json');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const manifest = await res.json();

            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            if (!manifest.products || manifest.products.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h2>暫無產品</h2><p>請在 products.json 中添加產品</p></div>';
                return;
            }

            // 顯示產品卡片（不預載SVG，加快手機加載速度）
            manifest.products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                // 提取型號縮寫做為預覽文字
                const modelHint = (product.model || product.id).substring(0, 6).toUpperCase();
                card.innerHTML = `
                    <div class="card-preview" style="font-size:48px;color:#D97757;background:#F0EEE6;">
                        ⚙ ${modelHint}
                    </div>
                    <div class="card-body">
                        <h3>${product.name}</h3>
                        <div class="model">型號: ${product.model || product.id}</div>
                    </div>
                `;
                card.addEventListener('click', () => {
                    window.location.href = './viewer.html?product=' + encodeURIComponent(product.id);
                });
                grid.appendChild(card);
            });

        } catch (err) {
            document.getElementById('product-grid').innerHTML =
                '<div class="empty-state"><h2>無法載入產品清單</h2><p>' + err.message + '</p></div>';
        }
    }

    loadProducts();
    </script>
</body>
</html>
