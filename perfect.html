<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBOM 完美版本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #FAF9F5; }
        .container { display: flex; min-height: 100vh; }
        .svg-panel { flex: 1; padding: 20px; background: white; border-right: 1px solid #E6E3DA; overflow: auto; display: flex; flex-direction: column; }
        .bom-panel { width: 400px; padding: 20px; background: white; overflow-y: auto; }

        /* SVG容器 - 移除transform scale，改用natural sizing */
        .svg-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #F0EEE6;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin: 20px 0;
            min-height: 500px;
            overflow: hidden;
        }
        .svg-container svg {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
        }

        /* 零件標籤樣式 */
        .part-label {
            position: absolute;
            background: rgba(217, 119, 87, 0.95);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 1000;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transform: translate(-50%, -50%);
        }
        .part-label.show { opacity: 1; }

        /* SVG 互動樣式 - 純CSS實現即時響應 */
        .svg-part {
            cursor: pointer;
            transition: filter 0.12s ease, transform 0.12s ease;
            transform-origin: center center;
            transform-box: fill-box;
            will-change: transform;
        }

        /* 懸停：顏色變 + 放大1.1倍 - !important 覆蓋SVG原始顏色 */
        .svg-part:hover {
            filter: drop-shadow(0 0 10px rgba(217, 119, 87, 0.6));
            transform: scale(1.1);
        }
        .svg-part:hover path,
        .svg-part:hover circle,
        .svg-part:hover rect,
        .svg-part:hover ellipse,
        .svg-part:hover line {
            stroke: #D97757 !important;
            stroke-width: 3px !important;
            fill: rgba(217, 119, 87, 0.1) !important;
        }

        /* 選中狀態 */
        .svg-part.selected {
            filter: drop-shadow(0 0 12px rgba(217, 119, 87, 0.8));
            transform: scale(1.1);
        }
        .svg-part.selected path,
        .svg-part.selected circle,
        .svg-part.selected rect,
        .svg-part.selected ellipse,
        .svg-part.selected line {
            stroke: #D97757 !important;
            stroke-width: 3px !important;
            fill: rgba(217, 119, 87, 0.1) !important;
        }

        /* BOM 清單樣式 */
        .bom-section { margin-bottom: 30px; }
        .bom-section h2 { color: #141413; margin-bottom: 15px; font-size: 18px; }

        /* 搜索框 */
        .search-box {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #E6E3DA;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
            background: #FAF9F5;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: #D97757; }

        .bom-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .bom-toolbar button {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #E6E3DA;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .bom-toolbar button:hover { background: #E3DACC; }

        .bom-list-container { max-height: 350px; overflow-y: auto; border: 1px solid #E6E3DA; border-radius: 8px; }
        .bom-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #E6E3DA; cursor: pointer; transition: all 0.3s ease; }
        .bom-item:last-child { border-bottom: none; }
        .bom-item:hover { background-color: #E3DACC; }
        .bom-item.selected { background-color: #D97757; color: white; }
        .bom-item.hidden { display: none; }
        .item-number { width: 28px; height: 28px; background: #E6E3DA; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; margin-right: 15px; flex-shrink: 0; color: #141413; }
        .bom-item.selected .item-number { background: white; color: #D97757; }
        .item-info { flex: 1; min-width: 0; }
        .part-number { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .part-name { font-size: 12px; color: #87867F; margin-bottom: 2px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bom-item.selected .part-name { color: rgba(255,255,255,0.85); }
        .part-quantity { font-size: 11px; color: #87867F; }
        .bom-item.selected .part-quantity { color: rgba(255,255,255,0.7); }

        /* 統計面板樣式 */
        .stats-section { margin-bottom: 30px; }
        .stats-header h2 { color: #141413; margin-bottom: 15px; font-size: 18px; }
        .stats-summary { background: #F0EEE6; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .stats-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #E6E3DA; font-size: 14px; }
        .stats-item:last-child { border-bottom: none; }

        .selected-items { margin-bottom: 20px; max-height: 250px; overflow-y: auto; }
        .selected-item { display: flex; align-items: center; padding: 10px; margin: 6px 0; background: #E3DACC; border-radius: 6px; gap: 8px; }
        .selected-item-info { flex: 1; min-width: 0; }
        .selected-item-info .part-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .qty-input {
            width: 60px;
            padding: 4px 6px;
            border: 1px solid #C4BBA8;
            border-radius: 4px;
            font-size: 13px;
            text-align: center;
            background: white;
        }
        .remove-btn {
            background: #D97757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
            line-height: 24px;
            text-align: center;
        }
        .remove-btn:hover { background: #B85C3E; }

        .email-btn {
            width: 100%;
            padding: 14px;
            background: #788C5D;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .email-btn:hover { background: #657A4A; }
        .email-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* 滚動條樣式 */
        .bom-list-container::-webkit-scrollbar,
        .selected-items::-webkit-scrollbar { width: 6px; }
        .bom-list-container::-webkit-scrollbar-track,
        .selected-items::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
        .bom-list-container::-webkit-scrollbar-thumb,
        .selected-items::-webkit-scrollbar-thumb { background: #D97757; border-radius: 3px; }
        .bom-list-container::-webkit-scrollbar-thumb:hover,
        .selected-items::-webkit-scrollbar-thumb:hover { background: #B85C3E; }

        /* 標題樣式 */
        .main-title { text-align: center; margin-bottom: 20px; color: #141413; }
        .svg-title { text-align: center; margin-bottom: 10px; color: #141413; }

        /* toast 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #141413;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 9999;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 爆炸圖面板 -->
        <div class="svg-panel">
            <h1 class="main-title">齒輪箱零件詢價系統</h1>
            <h2 class="svg-title">爆炸圖視圖</h2>
            <div class="svg-container" id="svg-container">
                <div style="text-align: center; padding: 40px; color: #87867F;">正在載入爆炸圖...</div>
            </div>
        </div>

        <!-- BOM 面板 -->
        <div class="bom-panel">
            <!-- 統計區域 -->
            <div class="stats-section">
                <div class="stats-header">
                    <h2>詢價統計</h2>
                </div>

                <div class="stats-summary">
                    <div class="stats-item">
                        <span>已選擇零件:</span>
                        <strong id="selected-count">0</strong>
                    </div>
                    <div class="stats-item">
                        <span>總數量:</span>
                        <strong id="total-quantity">0</strong>
                    </div>
                </div>

                <div class="selected-items">
                    <h3 style="margin-bottom: 10px; font-size: 14px; color: #141413;">已選擇零件:</h3>
                    <div id="selected-list"></div>
                </div>

                <button class="email-btn" onclick="sendInquiry()" id="email-btn" disabled>
                    發送詢價郵件
                </button>
            </div>

            <!-- 零件清單 -->
            <div class="bom-section">
                <h2>零件清單</h2>
                <input type="text" class="search-box" id="search-box" placeholder="搜尋零件編號或名稱..." oninput="filterBOM()">
                <div class="bom-toolbar">
                    <button onclick="selectAll()">全選</button>
                    <button onclick="clearAll()">清除</button>
                </div>
                <div class="bom-list-container">
                    <div id="bom-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 載入 SVG
        let bomInitialized = false;
        if (window.location.protocol === 'file:') {
            document.getElementById('svg-container').innerHTML =
                '<div style="color: orange; text-align: center; padding: 40px;">請使用本地伺服器來查看爆炸圖<br><small>可以使用: python -m http.server 8000</small></div>';
            initBOMList();
            bomInitialized = true;
        } else {
            fetch('./參考圖紙/p_type.dxf.svg')
                .then(response => {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.text();
                })
                .then(svgContent => {
                    document.getElementById('svg-container').innerHTML = svgContent;
                    processSVGAfterLoad();
                })
                .catch(err => {
                    document.getElementById('svg-container').innerHTML =
                        '<div style="color: red; text-align: center; padding: 40px;">載入 SVG 失敗：' + err.message + '</div>';
                    if (!bomInitialized) { initBOMList(); bomInitialized = true; }
                });
        }

        // BOM 資料
        const bomData = [
            { id: 'P01', partNumber: '400198', name: 'C型扣環<R-47>', quantity: 1 },
            { id: 'P02', partNumber: '405563', name: '滾珠軸承<60052RS>', quantity: 1 },
            { id: 'P03', partNumber: '404488', name: '油封<Ø25×Ø40×8t>', quantity: 2 },
            { id: 'P04', partNumber: '400993', name: '雙頭圓鍵<18×12×80L>', quantity: 1 },
            { id: 'P05', partNumber: '205320', name: '傳動軸', quantity: 1 },
            { id: 'P06', partNumber: '207041', name: '法蘭', quantity: 1 },
            { id: 'P07', partNumber: '400935', name: '油封<Ø65×Ø90×13t>', quantity: 1 },
            { id: 'P08', partNumber: '400826', name: '滾珠軸承<6212 Z>', quantity: 1 },
            { id: 'P09', partNumber: '400916', name: 'C型扣環<R-110>', quantity: 1 },
            { id: 'P10', partNumber: '205391', name: '第一齒輪', quantity: 1 },
            { id: 'P11', partNumber: '205420', name: '第四齒輪套管<Ø70×Ø50.5×18L>', quantity: 1 },
            { id: 'P12', partNumber: '200265', name: '第四齒輪', quantity: 1 },
            { id: 'P13', partNumber: '400197', name: 'C型扣環<S-50>', quantity: 1 },
            { id: 'P14', partNumber: '400170', name: '針軸承<NK 25/16>', quantity: 1 },
            { id: 'P15', partNumber: '400135', name: '滾珠軸承<6303>', quantity: 1 },
            { id: 'P16', partNumber: '402591', name: '齒輪箱襯墊<48#>', quantity: 1 },
            { id: 'P17', partNumber: '407454', name: '平行銷<Ø8×15L>', quantity: 3 },
            { id: 'P18', partNumber: '400095', name: '彈簧華司<M8>', quantity: 10 },
            { id: 'P19', partNumber: '400013', name: '窩頭螺絲<M8×1.25×25L>', quantity: 10 },
            { id: 'P20', partNumber: '400591', name: '管螺紋<3/8" PT>', quantity: 1 },
            { id: 'P21', partNumber: '400008', name: '窩頭螺絲<M6×1.0×25L>', quantity: 6 },
            { id: 'P22', partNumber: '407736', name: '滾珠軸承<6205>', quantity: 2 },
            { id: 'P23', partNumber: '205394', name: '第三齒輪', quantity: 1 },
            { id: 'P24', partNumber: '400975', name: '雙頭圓鍵<10×10×25L>', quantity: 1 },
            { id: 'P25', partNumber: '205393', name: '第二齒輪', quantity: 1 },
            { id: 'P26', partNumber: '400193', name: 'C型扣環<S-30>', quantity: 1 },
            { id: 'P27', partNumber: '400594', name: '油蓋<7/8"×14UNF>', quantity: 1 },
            { id: 'P28', partNumber: '205600', name: '齒輪箱', quantity: 1 }
        ];

        let selectedParts = new Map(); // partId -> { part, customQty }
        const partLabels = new Map();

        // 顯示 toast 提示
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // 將SVG坐標轉換為容器內的CSS像素坐標
        function svgPointToContainer(svgEl, containerEl, svgX, svgY) {
            const svgRect = svgEl.getBoundingClientRect();
            const containerRect = containerEl.getBoundingClientRect();
            const viewBox = svgEl.viewBox.baseVal;

            const scaleX = svgRect.width / viewBox.width;
            const scaleY = svgRect.height / viewBox.height;

            return {
                left: svgX * scaleX + (svgRect.left - containerRect.left),
                top: svgY * scaleY + (svgRect.top - containerRect.top)
            };
        }

        // 初始化 BOM 清單（先清空防止重複調用）
        function initBOMList() {
            const bomList = document.getElementById('bom-list');
            bomList.innerHTML = '';
            bomData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'bom-item';
                div.dataset.partId = item.id;
                div.innerHTML = `<div class="item-number">${index + 1}</div>
                    <div class="item-info">
                        <div class="part-number">${item.partNumber}</div>
                        <div class="part-name">${item.name}</div>
                        <div class="part-quantity">數量: ${item.quantity}</div>
                    </div>`;
                div.addEventListener('click', () => togglePartSelection(item.id));
                bomList.appendChild(div);
            });
        }

        // BOM 搜索過濾
        window.filterBOM = function() {
            const q = document.getElementById('search-box').value.trim().toLowerCase();
            document.querySelectorAll('.bom-item').forEach(el => {
                const info = el.querySelector('.part-info') || el;
                const text = el.textContent.toLowerCase();
                el.classList.toggle('hidden', q !== '' && !text.includes(q));
            });
        };

        // 全選
        window.selectAll = function() {
            bomData.forEach(item => {
                if (!selectedParts.has(item.id)) {
                    selectedParts.set(item.id, { part: item, customQty: item.quantity });
                    updateBOMSelection(item.id, true);
                    updateSVGSelection(item.id, true);
                }
            });
            updateStats();
            showToast('已全選 ' + selectedParts.size + ' 個零件');
        };

        // 清除所有選擇
        window.clearAll = function() {
            selectedParts.forEach((_, partId) => {
                updateBOMSelection(partId, false);
                updateSVGSelection(partId, false);
            });
            selectedParts.clear();
            updateStats();
        };

        // 切換零件選擇
        function togglePartSelection(partId) {
            if (selectedParts.has(partId)) {
                selectedParts.delete(partId);
                updateBOMSelection(partId, false);
                updateSVGSelection(partId, false);
            } else {
                const part = bomData.find(p => p.id === partId);
                if (part) {
                    selectedParts.set(partId, { part, customQty: part.quantity });
                    updateBOMSelection(partId, true);
                    updateSVGSelection(partId, true);
                }
            }
            updateStats();
        }

        // 更新 BOM 選擇狀態
        function updateBOMSelection(partId, selected) {
            const bomItem = document.querySelector(`[data-part-id="${partId}"]`);
            if (bomItem) {
                bomItem.classList.toggle('selected', selected);
            }
        }

        // 更新 SVG 選擇狀態（純 classList 操作，顏色由 CSS 控制）
        function updateSVGSelection(partId, selected) {
            const svgParts = document.querySelectorAll(`[data-part-id="${partId}"]`);
            svgParts.forEach(el => {
                el.classList.toggle('selected', selected);
            });
        }

        // 更新統計資訊
        function updateStats() {
            const selectedCount = selectedParts.size;
            let totalQty = 0;
            selectedParts.forEach(entry => { totalQty += entry.customQty; });

            document.getElementById('selected-count').textContent = selectedCount;
            document.getElementById('total-quantity').textContent = totalQty;

            // 更新已選擇清單
            const selectedList = document.getElementById('selected-list');
            selectedList.innerHTML = '';

            selectedParts.forEach((entry, partId) => {
                const part = entry.part;
                const div = document.createElement('div');
                div.className = 'selected-item';
                div.innerHTML = `
                    <div class="selected-item-info">
                        <div style="font-weight: 600; font-size: 13px;">${part.partNumber}</div>
                        <div class="part-name" style="font-size: 11px; color: #6B6A63;">${part.name}</div>
                    </div>
                    <input type="number" class="qty-input" value="${entry.customQty}" min="1" data-part-id="${partId}" onchange="updateQty('${partId}', this.value)">
                    <button class="remove-btn" onclick="removePart('${partId}')">×</button>
                `;
                selectedList.appendChild(div);
            });

            // 更新郵件按鈕狀態
            document.getElementById('email-btn').disabled = selectedCount === 0;
        }

        // 更新自定義數量
        window.updateQty = function(partId, value) {
            const qty = parseInt(value, 10);
            if (qty > 0 && selectedParts.has(partId)) {
                selectedParts.set(partId, { ...selectedParts.get(partId), customQty: qty });
                updateStats();
            }
        };

        // 移除零件選擇
        window.removePart = function(partId) {
            selectedParts.delete(partId);
            updateBOMSelection(partId, false);
            updateSVGSelection(partId, false);
            updateStats();
        };

        // 發送詢價郵件 - 改用 mailto:
        function sendInquiry() {
            if (selectedParts.size === 0) return;

            const to = '';
            const subject = encodeURIComponent('零件詢價請求 - ' + new Date().toLocaleDateString('zh-TW'));

            let bodyLines = [
                '尊敬的售後部門，',
                '',
                '請為以下零件提供報價：',
                '',
            ];

            selectedParts.forEach((entry, partId) => {
                const part = entry.part;
                bodyLines.push('• ' + part.partNumber + ' - ' + part.name + ' (數量: ' + entry.customQty + ')');
            });

            bodyLines.push('');
            bodyLines.push('總計：' + selectedParts.size + ' 種零件，總數量 ' +
                Array.from(selectedParts.values()).reduce((s, e) => s + e.customQty, 0) + ' 件');
            bodyLines.push('');
            bodyLines.push('請盡快回覆報價，謝謝！');
            bodyLines.push('');
            bodyLines.push('此致');
            bodyLines.push('敬禮');

            const body = encodeURIComponent(bodyLines.join('\n'));

            const mailtoUrl = 'mailto:' + to + '?subject=' + subject + '&body=' + body;

            // 先彈出確認，再打開 mailto
            const count = selectedParts.size;
            const totalQty = Array.from(selectedParts.values()).reduce((s, e) => s + e.customQty, 0);
            if (confirm('即將打開郵件客戶端，發送 ' + count + ' 種零件（共 ' + totalQty + ' 件）的詢價請求？')) {
                window.location.href = mailtoUrl;
            }
        }

        // Hover 標籤顯示（顏色變化由 CSS 控制）
        // 無需 restoreOriginalStyle / applySelectedStyle，CSS 通過 !important 處理

        function processSVGAfterLoad() {
            const svg = document.querySelector('#svg-container svg');
            const container = document.querySelector('.svg-container');
            if (!svg) return;

            // 调整SVG显示
            svg.style.width = '100%';
            svg.style.height = 'auto';
            svg.style.maxHeight = '100%';
            svg.style.preserveAspectRatio = 'xMidYMid meet';

            // 等待一幀確保佈局完成
            requestAnimationFrame(() => {
                // 統一所有圖形的樣式
                const allPaths = svg.querySelectorAll('path, circle, rect, ellipse, line');
                allPaths.forEach(path => {
                    path.style.stroke = '#141413';
                    path.style.strokeWidth = '2px';
                    path.style.fill = 'none';
                });

                const groups = svg.querySelectorAll('g');
                let foundParts = 0;

                groups.forEach(group => {
                    let label = null;
                    // 精確匹配 inkscape:label 屬性
                    for (let i = 0; i < group.attributes.length; i++) {
                        const attr = group.attributes[i];
                        if (attr.name === 'inkscape:label' && attr.value) {
                            const v = attr.value;
                            // 取第一個 '-' 之前的部分作為 partId
                            const dashIdx = v.indexOf('-');
                            if (dashIdx > 0) {
                                const candidate = v.substring(0, dashIdx);
                                if (candidate.startsWith('P')) {
                                    label = candidate;
                                    break;
                                }
                            }
                        }
                    }

                    if (label) {
                        const partId = label;
                        const partData = bomData.find(item => item.id === partId);

                        if (partData) {
                            group.setAttribute('data-part-id', partId);
                            group.classList.add('svg-part');

                            // 添加零件標籤（浮動在零件中心）
                            const labelElement = document.createElement('div');
                            labelElement.className = 'part-label';
                            labelElement.textContent = partData.id + ' - ' + partData.partNumber;
                            labelElement.id = 'label-' + partId;

                            // 用 getBBox + svg 坐標系映射到容器坐標
                            try {
                                const bbox = group.getBBox();
                                const cx = bbox.x + bbox.width / 2;
                                const cy = bbox.y + bbox.height / 2;
                                const pos = svgPointToContainer(svg, container, cx, cy);
                                labelElement.style.left = pos.left + 'px';
                                labelElement.style.top = pos.top + 'px';
                            } catch (e) {
                                // fallback: 放在容器中間
                                labelElement.style.left = '50%';
                                labelElement.style.top = '50%';
                            }

                            container.appendChild(labelElement);
                            partLabels.set(partId, labelElement);

                            group.addEventListener('click', () => togglePartSelection(partId));

                            // Hover：純CSS處理顏色/縮放，JS只控制標籤顯示
                            group.addEventListener('mouseenter', function() {
                                const labelEl = partLabels.get(partId);
                                if (labelEl) labelEl.classList.add('show');
                            });

                            group.addEventListener('mouseleave', function() {
                                const labelEl = partLabels.get(partId);
                                if (labelEl) labelEl.classList.remove('show');
                            });

                            foundParts++;
                        }
                    }
                });

                console.log('成功處理', foundParts, '個零件');

                // 窗口resize時重新定位標籤
                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        updateAllLabelPositions(svg, container);
                    }, 200);
                });

                console.log('成功處理', foundParts, '個零件');

                if (!bomInitialized) {
                    initBOMList();
                    bomInitialized = true;
                }
            });
        }

        function updateAllLabelPositions(svg, container) {
            bomData.forEach(item => {
                const labelEl = partLabels.get(item.id);
                if (!labelEl) return;
                const group = document.querySelector(`g[data-part-id="${item.id}"]`);
                if (!group) return;
                try {
                    const bbox = group.getBBox();
                    const cx = bbox.x + bbox.width / 2;
                    const cy = bbox.y + bbox.height / 2;
                    const pos = svgPointToContainer(svg, container, cx, cy);
                    labelEl.style.left = pos.left + 'px';
                    labelEl.style.top = pos.top + 'px';
                } catch (e) { /* ignore */ }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!bomInitialized && !document.querySelector('#svg-container svg')) {
                initBOMList();
                bomInitialized = true;
            }
        });
    </script>
</body>
</html>
